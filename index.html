<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfume</title>
    <link rel="icon" href="images/favicon-32x32.png" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="page">
      <div class="card">
        <picture>
          <source media="(max-width: 480px)" srcset="images/image-product-mobile.jpg">
          <img class="card__image" src="images/image-product-desktop.jpg" alt="Perfume"/>
        </picture>
        <div class="card__content">
          <span class="card__category">PERFUME</span>
          <h1 class="card__title">Gabrielle Essence Eau De Parfum</h1>
          <p class="card__description">
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.
          </p>
          <div class="card__price">
            <span class="card__price--current">$149.99</span>
            <s class="card__price--old">$169.99</s>
          </div>
          <button class="card__button">
          <img class="button__img" src="images/icon-cart.svg" alt="">  Add to Cart
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
